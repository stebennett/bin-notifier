name: CI

on:
  pull_request:
    branches:
      - '*'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Build
        run: |
          go build -v ./cmd/notifier
          go build -v ./cmd/api

      - name: Test
        run: go test -v ./...

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.0"

      - name: Python MCP tests
        run: |
          cd mcp
          uv sync
          uv run pytest -q

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Helm lint
        run: helm lint deploy/helm/bin-notifier -f deploy/helm/bin-notifier/ci-values.yaml

      - name: Helm template
        run: |
          helm template ci deploy/helm/bin-notifier -f deploy/helm/bin-notifier/ci-values.yaml > /tmp/rendered.yaml
          test -s /tmp/rendered.yaml
