{{- if not .Values.existingTokensSecret }}
{{- /*
  Preserve previously-generated tokens across helm upgrade. Helm cannot read its
  own prior random output, so without lookup we'd rotate tokens on every upgrade
  — silently breaking every consumer that holds the old value.
*/}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace (include "bin-notifier.tokensSecretName" .) }}
{{- $existingRead := "" }}
{{- $existingWrite := "" }}
{{- if $existing }}
  {{- if $existing.data }}
    {{- if hasKey $existing.data "read-token" }}
      {{- $existingRead = index $existing.data "read-token" | b64dec }}
    {{- end }}
    {{- if hasKey $existing.data "write-token" }}
      {{- $existingWrite = index $existing.data "write-token" | b64dec }}
    {{- end }}
  {{- end }}
{{- end }}
{{- $readToken := default $existingRead .Values.tokens.readToken }}
{{- if not $readToken }}{{- $readToken = randAlphaNum 40 }}{{- end }}
{{- $writeToken := default $existingWrite .Values.tokens.writeToken }}
{{- if not $writeToken }}{{- $writeToken = randAlphaNum 40 }}{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "bin-notifier.tokensSecretName" . }}
  labels: {{- include "bin-notifier.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  read-token: {{ $readToken | quote }}
  write-token: {{ $writeToken | quote }}
{{- end }}
